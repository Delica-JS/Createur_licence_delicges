<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Délic'GES — Générateur de licences</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'Segoe UI',sans-serif;
      background:#f0f4f8;
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;padding:20px;
    }
    .box {
      background:white;border-radius:14px;
      padding:32px;max-width:500px;width:100%;
      box-shadow:0 8px 32px rgba(0,0,0,.1);
    }
    h2 {
      font-size:20px;color:#1a3a5c;
      margin-bottom:6px;text-align:center;
    }
    .sub {
      font-size:12px;color:#64748b;
      text-align:center;margin-bottom:20px;
    }
    label {
      display:block;font-size:11px;font-weight:700;
      color:#64748b;margin-bottom:4px;margin-top:14px;
      text-transform:uppercase;letter-spacing:.06em;
    }
    input {
      width:100%;padding:9px 12px;border:1px solid #dde3ec;
      border-radius:6px;font-size:13px;font-family:inherit;
      outline:none;
    }
    input:focus { border-color:#2563a8; }
    button {
      width:100%;padding:12px;margin-top:18px;
      background:#1a3a5c;color:white;border:none;
      border-radius:8px;font-size:14px;font-weight:700;
      cursor:pointer;
    }
    button:hover { background:#2563a8; }
    .result {
      margin-top:16px;padding:16px;
      background:#f0fdf4;border:2px solid #16a34a;
      border-radius:8px;
    }
    .cle {
      font-family:monospace;font-size:16px;
      font-weight:800;color:#15803d;
      letter-spacing:.08em;text-align:center;
      margin:8px 0;
    }
    .btn-dl {
      background:#16a34a;font-size:13px;
      padding:10px;width:100%;margin-top:10px;
    }
    .secret-warn {
      background:#fef3c7;border:1px solid #d97706;
      border-radius:6px;padding:10px;font-size:11px;
      color:#92400e;margin-bottom:16px;text-align:center;
    }
  </style>
</head>
<body>
<div class="box">

  <h2>🔑 Délic'GES — Générateur de licences</h2>
  <div class="sub">Outil confidentiel — Usage interne uniquement</div>

  <div class="secret-warn">
    ⚠️ Ne jamais partager ce fichier avec les clients
  </div>

  <label>Nom de l'école (exactement comme dans l'appli)</label>
  <input type="text" id="nomEcole"
         placeholder="Complexe Scolaire Alpha">

  <label>Date d'expiration</label>
  <input type="date" id="dateExp">

  <label>Code machine du client (Hardware ID)</label>
  <input type="text" id="hwId"
         placeholder="A1B2C3D4E5F6"
         style="font-family:monospace;text-transform:uppercase;">

  <label>Durée (jours) — informatif</label>
  <input type="number" id="duree" placeholder="365" value="365">

  <button onclick="generer()">🔑 Générer la licence</button>

  <div id="result" style="display:none;" class="result">
    <div style="font-size:12px;color:#64748b;margin-bottom:4px;
                text-align:center;">
      LICENCE GÉNÉRÉE
    </div>
    <div class="cle" id="cle_generee"></div>
    <div style="font-size:11px;color:#64748b;text-align:center;
                margin-top:4px;" id="info_licence"></div>
    <button class="btn-dl" onclick="telecharger()">
      📥 Télécharger le fichier .lic
    </button>
  </div>

</div>

<script>
  const SECRET = 'DELICGES_2025_SECRET_KEY';
  let licenceData = null;

  async function hmac(secret, message) {
    const enc = new TextEncoder();
    const key = await crypto.subtle.importKey(
      'raw', enc.encode(secret),
      { name:'HMAC', hash:'SHA-256' },
      false, ['sign']
    );
    const sig = await crypto.subtle.sign(
      'HMAC', key, enc.encode(message)
    );
    return Array.from(new Uint8Array(sig))
      .map(b => b.toString(16).padStart(2,'0'))
      .join('')
      .toUpperCase();
  }

  async function generer() {
    const nomEcole = document.getElementById('nomEcole').value.trim();
    const dateExp  = document.getElementById('dateExp').value;
    const hwId     = document.getElementById('hwId').value.trim().toUpperCase();
    const duree    = document.getElementById('duree').value || '365';

    if (!nomEcole) { alert('Entrez le nom de l\'école.'); return; }
    if (!dateExp)  { alert('Entrez la date d\'expiration.'); return; }
    if (!hwId)     { alert('Entrez le code machine.'); return; }

    const payload   = `${nomEcole.toUpperCase()}|${dateExp}|${hwId}`;
    const signature = await hmac(SECRET, payload);
    const sig12     = signature.slice(0, 12);
    const cle       = `DLCG-${sig12.slice(0,4)}-${sig12.slice(4,8)}-${sig12.slice(8,12)}`;

    // Construire les données de la licence
    licenceData = {
      version:        '1.0',
      produit:        'DELICGES',
      cle,
      nomEcole,
      hardwareId:     hwId,
      dateExpiration: dateExp,
      dateEmission:   new Date().toISOString().slice(0, 10),
      dureeJours:     parseInt(duree),
    };

    document.getElementById('cle_generee').textContent = cle;
    document.getElementById('info_licence').textContent =
      `${nomEcole} · Expire le ${dateExp.split('-').reverse().join('/')} · Machine : ${hwId}`;
    document.getElementById('result').style.display = 'block';
  }

  function telecharger() {
    if (!licenceData) return;

    // Encoder en base64 pour obscurcir le contenu
    const contenu  = btoa(JSON.stringify(licenceData));
    const nomFich  = `DelicGES_${licenceData.nomEcole.replace(/\s+/g,'_')}_${licenceData.dateExpiration}.lic`;
    const blob     = new Blob([contenu], { type: 'text/plain' });
    const url      = URL.createObjectURL(blob);
    const a        = document.createElement('a');
    a.href         = url;
    a.download     = nomFich;
    a.click();
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
